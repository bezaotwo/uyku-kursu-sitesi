  <style>
    .pu-announcement {
      background: linear-gradient(180deg, #faf9f6 0%, #f5ede0 100%);
      padding: 56px 20px;
    }

    .pu-announcement__inner {
      max-width: 1100px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e8dcca;
      border-radius: 24px;
      box-shadow: 0 20px 50px -25px rgba(30, 27, 75, 0.25);
      padding: 36px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 36px;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .pu-announcement__inner::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(192, 144, 102, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .pu-announcement__cover {
      position: relative;
    }

    .pu-announcement__cover img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      box-shadow: 0 18px 40px -18px rgba(30, 27, 75, 0.45);
      transform: rotate(-2deg);
      transition: transform 0.4s ease;
    }

    .pu-announcement__cover img:hover {
      transform: rotate(0deg) scale(1.02);
    }

    .pu-announcement__badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1e1b4b;
      color: #faf9f6;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    .pu-announcement__badge::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #c09066;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(192, 144, 102, 0.3);
      animation: pu-pulse 1.8s ease-in-out infinite;
    }

    @keyframes pu-pulse {

      0%,
      100% {
        box-shadow: 0 0 0 4px rgba(192, 144, 102, 0.3);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(192, 144, 102, 0.05);
      }
    }

    .pu-announcement__title {
      font-family: 'Outfit', sans-serif;
      color: #1e1b4b;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.15;
      margin: 0 0 12px 0;
    }

    .pu-announcement__desc {
      font-family: 'Inter', sans-serif;
      color: #5a5570;
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 22px 0;
      max-width: 560px;
    }

    .pu-announcement__cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #1e1b4b;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 26px;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .pu-announcement__cta:hover {
      background: #c09066;
      transform: translateY(-2px);
    }

    .pu-announcement__cta svg {
      transition: transform 0.2s ease;
    }

    .pu-announcement__cta:hover svg {
      transform: translateX(4px);
    }

    @media (max-width: 720px) {
      .pu-announcement {
        padding: 36px 16px;
      }

      .pu-announcement__inner {
        grid-template-columns: 1fr;
        padding: 28px;
        gap: 24px;
        text-align: center;
      }

        margin: 0 auto;
      }

      }

      .pu-announcement__desc {
        margin-left: auto;
        margin-right: auto;
      }
    }
  </style>
  <script>
    (function () {
      function buildAnnouncement() {
        var section = document.createElement('section');
        section.className = 'pu-announcement';
        section.setAttribute('aria-label', 'Yeni e-kitap duyurusu');
        section.innerHTML = ''
          + '<div class="pu-announcement__inner">'
          + '<div class="pu-announcement__cover">'
          + '<img src="/assets/ekitap1.png" alt="Pedagojik Uyku E-Kitap Kapağı" loading="lazy" />'
          + '</div>'
          + '<div class="pu-announcement__content">'
          + '<span class="pu-announcement__badge">Yeni Çıktı</span>'
          + '<h2 class="pu-announcement__title">Pedagojik Uyku E-Kitap Çıktı!</h2>'
          + '<p class="pu-announcement__desc">Bebeğinizin sağlıklı uyku alışkanlıkları kazanması için hazırladığımız kapsamlı rehber artık dijital olarak elinizin altında. Uzman önerileri, yaş bazlı rutinler ve uygulanabilir adımlarla tanışın.</p>'
          + '<a href="https://wa.me/905431461104" target="_blank" rel="noopener noreferrer" class="pu-announcement__cta">'
          + 'İletişime Geç'
          + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>'
          + '</a>'
          + '</div>'
          + '</div>';
        return section;
      }

      function tryInsert() {
        if (document.querySelector('.pu-announcement')) return true;
        var hero = document.getElementById('home');
        if (!hero || !hero.parentNode) return false;
        hero.parentNode.insertBefore(buildAnnouncement(), hero.nextSibling);
        return true;
      }

      function init() {
        if (tryInsert()) return;
        var observer = new MutationObserver(function () {
          if (tryInsert()) observer.disconnect();
        });
        observer.observe(document.body, { childList: true, subtree: true });
        setTimeout(function () { observer.disconnect(); }, 15000);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
  <div id="root"></div>
